<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Fuego Vivo — Samuel Martín Frías</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #e8e4dc;
  font-family: Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
}
.card {
  width: 600px;
  max-width: 100%;
  background: #ffffff;
  border-top: 6px solid #3d7a4a;
  box-shadow: 0 20px 80px rgba(0,0,0,0.15), -4px 0 16px rgba(0,0,0,0.08);
  padding: 56px 56px 48px;
}
.cover-art { width: 130px; height: 170px; display: block; margin: 0 auto 28px; }
.title { font-size: 52px; font-weight: 400; color: #1a1208; line-height: 1; text-align: center; }
.subtitle { font-size: 16px; font-style: italic; color: #888; text-align: center; margin-top: 10px; }
.author { font-size: 12px; letter-spacing: 4px; color: #aaa; text-align: center; margin-top: 14px; text-transform: uppercase; }
.rule { width: 100%; height: 1px; background: #3d7a4a; opacity: .25; margin: 36px 0 8px; }
.eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #3d7a4a; margin-bottom: 8px; }
.entries { display: flex; flex-direction: column; }
.entry {
  display: flex; align-items: baseline; gap: 14px;
  padding: 18px 0; border-bottom: 1px solid #f0ece4;
  text-decoration: none; transition: opacity .15s;
}
.entry:hover { opacity: .55; }
.entry-num { font-size: 12px; color: #2a7ab5; width: 20px; flex-shrink: 0; }
.entry-name { flex: 1; font-size: 19px; font-weight: 400; color: #1a1208; }
.entry-arrow { font-size: 13px; color: #2a7ab5; flex-shrink: 0; }
.entry.pending { pointer-events: none; }
.entry.pending .entry-num, .entry.pending .entry-name, .entry.pending .entry-arrow { color: #ddd; font-style: italic; }
@media (max-width: 640px) {
  .card { padding: 40px 28px 36px; }
  .title { font-size: 40px; }
}
</style>
</head>
<body>

  <div class="card">

    <svg class="cover-art" viewBox="0 0 180 240" xmlns="http://www.w3.org/2000/svg">
      <path d="M90,20 Q150,40 168,108 Q180,168 138,206 Q100,238 56,214 Q14,188 12,120 Q12,52 90,20Z" fill="#3d7a4a" opacity=".9"/>
      <path d="M90,62 Q128,80 138,128 Q146,170 110,192 Q78,210 50,184 Q24,160 30,116 Q38,72 90,62Z" fill="#ffffff"/>
      <circle cx="88" cy="128" r="26" fill="#2a7ab5"/>
      <circle cx="88" cy="128" r="9" fill="#ffffff"/>
    </svg>

    <div class="title">A Fuego Vivo</div>
    <div class="subtitle">notas de un canario</div>
    <div class="author">Samuel Martín Frías</div>

    <div class="rule"></div>
    <div class="eyebrow">Índice</div>

    <div class="entries">
      <a class="entry" href="receta_birria.html">
        <span class="entry-num">1</span>
        <span class="entry-name">Birria Tacos</span>
        <span class="entry-arrow">→</span>
      </a>
      <a class="entry" href="judias-vinagreta.html">
        <span class="entry-num">2</span>
        <span class="entry-name">Judías a la Vinagreta</span>
        <span class="entry-arrow">→</span>
      </a>
      <a class="entry" href="fajitas-pollo.html">
        <span class="entry-num">3</span>
        <span class="entry-name">Fajitas de Pollo</span>
        <span class="entry-arrow">→</span>
      </a>
      <a class="entry" href="sopa-tailandesa.html">
        <span class="entry-num">4</span>
        <span class="entry-name">Sopa de Pollo Tailandesa</span>
        <span class="entry-arrow">→</span>
      </a>
      <div class="entry pending">
        <span class="entry-num">5</span>
        <span class="entry-name">por venir</span>
        <span class="entry-arrow">—</span>
      </div>
    </div>

  </div>

</body>
</html>
